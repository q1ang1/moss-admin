name: Bug Report
description: Report a bug in the starter repository.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 这个问题在什么场景下出现？
    validations:
      required: true
  - type: textarea
    id: expectation
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤

