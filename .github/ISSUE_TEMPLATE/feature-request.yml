name: Feature Request
description: Suggest a new feature for the repository.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: target
    attributes:
      label: 目标
      description: 你希望解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案想法
      description: 你期待的实现方式是什么？
    validations:
      required: true

